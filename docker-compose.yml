x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

services:
  mongodb:
    image: mongo:7.0.16
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet \"mongodb://127.0.0.1:27017/admin\" --eval \"db.runCommand({ ping: 1 }).ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      - db-net

  course-postgres:
    image: postgres:16.8-alpine3.21
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - course_postgres_data:/var/lib/postgresql/data
      - ./backend/course-service/app/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U course_user -d course_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      - db-net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    networks:
      - backend-net

  redis:
    image: redis:7.4.2-alpine3.21
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    networks:
      - db-net

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      USER_BACKEND_ENV: ${USER_BACKEND_ENV}
      USER_BACKEND_PORT: ${USER_BACKEND_PORT}
      USER_BACKEND_URL: ${USER_BACKEND_URL}
      USER_BACKEND_PUBLIC_FRONTEND_URL: ${USER_BACKEND_PUBLIC_FRONTEND_URL}
      USER_BACKEND_JWT_SECRET_KEY: ${USER_BACKEND_JWT_SECRET_KEY}
      USER_BACKEND_JWT_EXPIRE_TIME: ${USER_BACKEND_JWT_EXPIRE_TIME}
      USER_BACKEND_MONGODB_URI: ${USER_BACKEND_MONGODB_URI}
      USER_BACKEND_APP_NAME: ${USER_BACKEND_APP_NAME}
      USER_BACKEND_EMAIL_PORT: ${USER_BACKEND_EMAIL_PORT}
      USER_BACKEND_EMAIL_SECURE: ${USER_BACKEND_EMAIL_SECURE}
      USER_BACKEND_EMAIL_FROM: ${USER_BACKEND_EMAIL_FROM}
      USER_BACKEND_EMAIL_USER: ${USER_BACKEND_EMAIL_USER}
      USER_BACKEND_EMAIL_PASSWORD: ${USER_BACKEND_EMAIL_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const net=require('net');const p=Number(process.env.USER_BACKEND_PORT||'8002');const s=net.connect(p,'127.0.0.1',()=>{s.end();process.exit(0);});s.on('error',()=>process.exit(1));s.setTimeout(5000,()=>{s.destroy();process.exit(1);});\""]
      interval: 15s
      timeout: 7s
      retries: 6
      start_period: 25s
    depends_on:
      mongodb:
        condition: service_healthy
    logging: *default-logging
    networks:
      - db-net
      - backend-net

  course-service:
    build:
      context: ./backend/course-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      COURSE_BACKEND_ENV: ${COURSE_BACKEND_ENV}
      COURSE_BACKEND_LOG_LEVEL: ${COURSE_BACKEND_LOG_LEVEL}
      COURSE_BACKEND_PORT: ${COURSE_BACKEND_PORT}
      COURSE_BACKEND_POSTGRES_URL: ${COURSE_BACKEND_POSTGRES_URL}
      COURSE_BACKEND_JWT_SECRET_KEY: ${COURSE_BACKEND_JWT_SECRET_KEY}
      COURSE_BACKEND_JWT_ALGORITHM: ${COURSE_BACKEND_JWT_ALGORITHM}
      COURSE_BACKEND_ACCESS_TOKEN_EXPIRE_MINUTES: ${COURSE_BACKEND_ACCESS_TOKEN_EXPIRE_MINUTES}
      COURSE_BACKEND_MINIO_ENDPOINT: ${COURSE_BACKEND_MINIO_ENDPOINT}
      COURSE_BACKEND_MINIO_PUBLIC_URL: ${COURSE_BACKEND_MINIO_PUBLIC_URL}
      COURSE_BACKEND_MINIO_ACCESS_KEY: ${COURSE_BACKEND_MINIO_ACCESS_KEY}
      COURSE_BACKEND_MINIO_SECRET_KEY: ${COURSE_BACKEND_MINIO_SECRET_KEY}
      COURSE_BACKEND_MINIO_BUCKET_NAME: ${COURSE_BACKEND_MINIO_BUCKET_NAME}
      COURSE_BACKEND_MINIO_SECURE: ${COURSE_BACKEND_MINIO_SECURE}
      COURSE_BACKEND_ANALYTICS_URL: ${COURSE_BACKEND_ANALYTICS_URL}
      COURSE_BACKEND_ANALYTICS_REQUEST_TIMEOUT_SECONDS: ${COURSE_BACKEND_ANALYTICS_REQUEST_TIMEOUT_SECONDS}
      COURSE_BACKEND_APP_NAME: ${COURSE_BACKEND_APP_NAME}
      COURSE_BACKEND_APP_VERSION: ${COURSE_BACKEND_APP_VERSION}
      COURSE_BACKEND_DEBUG: ${COURSE_BACKEND_DEBUG}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,urllib.request,sys;p=os.getenv('COURSE_BACKEND_PORT','8001');url=f'http://127.0.0.1:{p}/health';sys.exit(0 if urllib.request.urlopen(url, timeout=5).getcode()==200 else 1)\""]
      interval: 15s
      timeout: 7s
      retries: 6
      start_period: 25s
    depends_on:
      course-postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    logging: *default-logging
    networks:
      - db-net
      - backend-net

  analytics-service:
    build:
      context: ./backend/analytics-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ANALYTICS_BACKEND_ENV: ${ANALYTICS_BACKEND_ENV}
      ANALYTICS_BACKEND_PORT: ${ANALYTICS_BACKEND_PORT}
      ANALYTICS_BACKEND_POSTGRES_URL: ${ANALYTICS_BACKEND_POSTGRES_URL}
      ANALYTICS_BACKEND_JWT_SECRET_KEY: ${ANALYTICS_BACKEND_JWT_SECRET_KEY}
      ANALYTICS_BACKEND_JWT_ALGORITHM: ${ANALYTICS_BACKEND_JWT_ALGORITHM}
      ANALYTICS_BACKEND_REDIS_HOST: ${ANALYTICS_BACKEND_REDIS_HOST}
      ANALYTICS_BACKEND_REDIS_PORT: ${ANALYTICS_BACKEND_REDIS_PORT}
      ANALYTICS_BACKEND_REDIS_TTL_SECONDS: ${ANALYTICS_BACKEND_REDIS_TTL_SECONDS}
      ANALYTICS_BACKEND_APP_NAME: ${ANALYTICS_BACKEND_APP_NAME}
      ANALYTICS_BACKEND_LOG_LEVEL: ${ANALYTICS_BACKEND_LOG_LEVEL}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,urllib.request,sys;p=os.getenv('ANALYTICS_BACKEND_PORT','8003');url=f'http://127.0.0.1:{p}/health';sys.exit(0 if urllib.request.urlopen(url, timeout=5).getcode()==200 else 1)\""]
      interval: 15s
      timeout: 7s
      retries: 6
      start_period: 25s
    depends_on:
      course-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging
    networks:
      - db-net
      - backend-net

  frontend:
    build:
      context: ../elearning-microservice-platform-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${FRONTEND_NODE_ENV}
      NEXT_PUBLIC_USER_SERVICE_URL: ${NEXT_PUBLIC_USER_SERVICE_URL}
      NEXT_PUBLIC_COURSE_SERVICE_URL: ${NEXT_PUBLIC_COURSE_SERVICE_URL}
      NEXT_PUBLIC_ANALYTICS_SERVICE_URL: ${NEXT_PUBLIC_ANALYTICS_SERVICE_URL}
      NEXT_PUBLIC_MINIO_URL: ${NEXT_PUBLIC_MINIO_URL}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const net=require('net');const s=net.connect(3000,'127.0.0.1',()=>{s.end();process.exit(0);});s.on('error',()=>process.exit(1));s.setTimeout(5000,()=>{s.destroy();process.exit(1);});\""]
      interval: 15s
      timeout: 7s
      retries: 6
      start_period: 30s
    logging: *default-logging
    networks:
      - backend-net
      - frontend-net

  gateway:
    image: nginx:1.27.4-alpine3.21
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      user-service:
        condition: service_healthy
      course-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      minio:
        condition: service_healthy
      frontend:
        condition: service_healthy
    logging: *default-logging
    networks:
      - backend-net
      - frontend-net

volumes:
  mongodb_data:
  course_postgres_data:
  minio_data:
  redis_data:

networks:
  db-net:
    driver: bridge
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge